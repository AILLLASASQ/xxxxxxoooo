services:
  - type: web
    name: xo-bot
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python bot.py
    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: OWNER_ID
        sync: false
      - key: WEBHOOK_BASE
        sync: false
      - key: WEBHOOK_SECRET
        sync: false
      - key: FIREBASE_CREDENTIALS_B64
        sync: false
